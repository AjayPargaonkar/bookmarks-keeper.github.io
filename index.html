<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Open Model -->
  <h1 id="show-modal">Add Bookmark</h1>
   <!-- bookmarks -->
   <div class="container" id="bookmarks-container">
    
   </div>
   <!-- Model -->
   <div class="modal-container" id="modal">
    <div class="modal">
        <i class="fas fa-times close-icon" id="close-modal">
        </i>
        <div class="modal-header">
            <h3>Add Bookmark</h3>
        </div>
        <div class="modal-content">
            <form id="bookmark-form">
                <!-- Webiste Name -->
                <div class="form-group">
                    <!-- Lable for name and input id name should same -->
                    <label for="website-name" class="form-label">Website Name</label>
                    <input type="text" class="form-input" id="website-name">
                </div>

                <!-- Webiste Url -->
                <div class="form-group">
                    <!-- Lable for name and input id name should same -->
                    <label for="website-url" class="form-label">Website url</label>
                    <input type="text" class="form-input" id="website-url">
                </div>

                <button type="submit">Save</button>
            </form>
        </div>
    </div>
   </div>
    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
